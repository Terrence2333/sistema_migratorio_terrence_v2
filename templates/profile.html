{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="glass-panel">
        <h3 class="text-accent">PERFIL DE USUARIO // GESTIÓN</h3>
        <div class="row">
            <div class="col-md-4 text-center">
                <div class="radar-pulse" style="width: 150px; height: 150px; border-radius: 50%; background: #333; margin: auto;"></div>
                <h5 class="mt-3">TERRENCE_ADMIN</h5>
            </div>
            <div class="col-md-8">
                <form action="/update_profile" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Nombre Completo</label><input type="text" name="name" class="form-control"></div>
                        <div class="col-md-6 mb-3"><label>Correo</label><input type="email" name="email" class="form-control"></div>
                    </div>
                    <button type="submit" class="btn btn-success">GUARDAR CONFIGURACIÓN</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
