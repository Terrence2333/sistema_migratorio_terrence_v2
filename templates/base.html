<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIGRATORIO V4.2</title>

        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }

    <nav>

        <a href="/">Usuarios</a>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</html>
