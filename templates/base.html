{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="glass-panel">
                <h4 class="text-accent">AUDITORÍA TXT (Sistema)</h4>
                <div class="log-container" style="height: 600px; overflow-y: scroll; background: #000; padding: 15px; font-size: 10px;">
                    <code>{{ contenido_txt }}</code>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-panel">
                <h4 class="text-accent">ESTRUCTURA JSON (Data)</h4>
                <div class="json-container" style="height: 600px; overflow-y: scroll; background: #111; padding: 15px;">
                    <pre class="text-white">{{ contenido_json }}</pre>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-panel">
                <h4 class="text-accent">REPORTE CSV (Export)</h4>
                <table class="table table-sm table-dark">
                    <thead><tr><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr></thead>
                    <tbody>
                        {% for row in contenido_csv %}
                        <tr><td>{{ row[0] }}</td><td>{{ row[1] }}</td><td>{{ row[2] }}</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
