<div class="table-panel">
    <h3>BITÁCORA DE CONTROL</h3>
    <table border="1" width="100%">
        <tr>
            <th>Nombre</th>
            <th>Cantidad</th>
            <th>Precio</th>
        </tr>
        {% for p in productos %}
        <tr>
            <td>{{ p.nombre }}</td>
            <td>{{ p.cantidad }}</td>
            <td>{{ p.precio }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
