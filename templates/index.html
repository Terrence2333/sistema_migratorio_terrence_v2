<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>TERRENCE.M // SISTEMA MIGRATORIO V4.2</title>
</head>
<body>
    <header>
        <h1>TERRENCE.M // SISTEMA MIGRATORIO V4.2</h1>
        <nav>
            <a href="/">Inicio #</a>
            <a href="/productos">Productos ORM</a>
            <a href="/archivos">Archivos</a>
            <a href="/datos">Acerca de</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="panel">
            <h3>AGREGAR PRODUCTO (ORM)</h3>
            <form action="/agregar" method="POST">
                <input type="text" name="nombre" placeholder="Nombre" required>
                <input type="number" name="cantidad" placeholder="Cantidad" required>
                <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required>
                <button type="submit">Guardar vía ORM</button>
            </form>
        </div>

        <div class="panel">
            <h3>GESTIÓN CON SQLALCHEMY ORM</h3>
            <table>
                <tr><th>ID</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr>
                {% for p in productos %}
                <tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>
                {% endfor %}
            </table>
        </div>

        <div class="panel">
            <h3>CANALES DE ENLACE</h3>
            <button>facebook</button>
        </div>
    </div>
</body>
</html>
