<div class="main-container">
    <div class="panel">
        <h3>AGREGAR PRODUCTO (ORM)</h3>
        <form action="/agregar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="number" name="cantidad" placeholder="Cantidad" required>
            <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required>
            <button type="submit">Guardar vía ORM</button>
        </form>
    </div>

    <div class="panel">
        <h3>GESTIÓN CON SQLALCHEMY ORM</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                </tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.nombre }}</td>
                    <td>{{ p.cantidad }}</td>
                    <td>${{ p.precio }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="panel">
        <h3>CANALES DE ENLACE</h3>
        <button onclick="window.location.href='#'">facebook</button>
    </div>
</div>
