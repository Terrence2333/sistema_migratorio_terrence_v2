<div class="form-panel">
    <h3>Guardar registro</h3>
    <form action="/guardar" method="POST">
        <input type="text" name="nombre" placeholder="Nombre del producto" required>
        <input type="number" name="cantidad" placeholder="Cantidad" required>
        <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required>
        <p>Guardar en formato:</p>
        <input type="radio" name="formato" value="txt" checked> TXT
        <input type="radio" name="formato" value="json"> JSON
        <input type="radio" name="formato" value="csv"> CSV
        <button type="submit">Guardar en archivo</button>
    </form>
</div>
