<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>SISTEMA MIGRATORIO V4.2</title>
</head>
<body>
    <h1>TERRENCE.M // SISTEMA MIGRATORIO V4.2</h1>
    <div class="main-container">
        <div class="form-panel">
            <h3>Agregar Producto (ORM)</h3>
            <form action="/agregar" method="POST">
                <input type="text" name="nombre" placeholder="Nombre" required>
                <input type="number" name="cantidad" placeholder="Cantidad" required>
                <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required>
                <button type="submit">Guardar vía ORM</button>
            </form>
        </div>
        
        <div class="table-panel">
            <h3>Gestión con SQLAlchemy ORM</h3>
            <table>
                <tr>
                    <th>Nombre</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                </tr>
                {% for p in productos %}
                <tr>
                    <td>{{ p.nombre }}</td>
                    <td>{{ p.cantidad }}</td>
                    <td>{{ p.precio }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
