{% extends "base.html" %}
{% block content %}
<div class="nav-bar">Inicio # | Productos ORM | Archivos | Acera de</div>
<div class="main-container">
    <div class="panel">
        <h3>AGREGAR PRODUCTO (ORM)</h3>
        <form action="/agregar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="number" name="cantidad" placeholder="Cantidad" required>
            <button type="submit">Guarad vía ORM</button>
        </form>
    </div>
    <div class="panel" style="width: 400px;">
        <h3>GESTIÓN CON SQLALCHEMY ORM</h3>
        <table>
            <tr><th>ID</th><th>Nombre</th><th>Cant.</th></tr>
            {% for p in productos %}
            <tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td></tr>
            {% endfor %}
        </table>
    </div>
    <div class="panel">
        <h3>CANALS DE ENLACE</h3>
        <button>facebook</button> <button>test</button>
    </div>
</div>
{% endblock %}
