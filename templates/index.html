{% extends "base.html" %}
{% block content %}
<div class="main-container">
    <div class="panel">
        <h3>AGREGAR PRODUCTO (ORM)</h3>
        <form action="/agregar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre del producto" required>
            <input type="number" name="cantidad" placeholder="Cantidad" required>
            <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required>
            <button type="submit">GUARDAR EN BASE DE DATOS</button>
        </form>
    </div>
    <div class="panel" style="width: 500px;">
        <h3>GESTIÓN SQLALCHEMY</h3>
        <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Cant.</th><th>Precio</th></tr></thead>
            <tbody>
                {% for p in productos %}
                <tr><td>{{ p.id }}</td><td>{{ p.nombre }}</td><td>{{ p.cantidad }}</td><td>${{ p.precio }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
